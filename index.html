<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Drag & Drop Gym Calendar</title>
</head>

<body>
   <section class="base">
    <div class="base-heading">
        <div class="head-title">
            <h2>WEEKLY</h2>
            <p>workout plan</p>
        </div>
        <div class="head-infos">
            <div class="info-title">
                <h3>Schedule</h3>
                <i class="bi bi-calendar3"></i>
            </div>
            <div class="info-text">
                <h3>Stay consistent</h3>
                <i class="bi bi-trophy"></i>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="calendar">
            <div class="header">
                <div class="prev"><i class="bi bi-caret-left"></i></div>
                <div class="month-year"></div>
                <div class="next"><i class="bi bi-caret-right"></i></div>
            </div>
            <div class="week-days">
                <div>Sun</div>
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>
            </div>
            <div class="days"></div>
        </div>
        <div class="tasks">
            <div class="tsk-header">
                <h2 class="tsk-title">Tasks</h2>
            </div>
            <div class="tsk-container">
                <ul class="tsk-list">
                    <li class="tsk-item">Leg Day</li>
                    <li class="tsk-item">Chest Day</li>
                    <li class="tsk-item">Shoulder Day</li>
                    <li class="tsk-item">Arms Day</li>
                </ul>
            </div>
        </div>
    </div>
   </section> 



    <script src="./script.js"></script>
</body>

</html>
