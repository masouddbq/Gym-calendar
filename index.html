<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Drag & Drop Gym Calendar</title>
</head>

<body>
    <div class="calendar">
        <div class="header">
            <div class="prev"></div>
            <div class="month-year"></div>
            <div class="next"></div>
        </div>
        <div class="week-days">
            <div>Sun</div>
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
        </div>
        <div class="days"></div>
    </div>


    <script src="./script.js"></script>
</body>

</html>
