<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Drag & Drop Gym Calendar</title>
</head>

<body>
    <section class="base">
        <div class="base-heading">
            <div class="head-title">
                <h2>WEEKLY</h2>
                <p>workout plan</p>
            </div>
            <div class="head-infos">
                <div class="info-title">
                    <h3>Schedule</h3>
                    <i class="bi bi-calendar3"></i>
                </div>
                <div class="info-text">
                    <h3>Stay consistent</h3>
                    <i class="bi bi-trophy"></i>
                </div>
            </div>
        </div>
        <div class="container">
            <div class="calendar">
                <div class="header">
                    <div class="prev"><i class="bi bi-caret-left"></i></div>
                    <div class="month-year"></div>
                    <div class="next"><i class="bi bi-caret-right"></i></div>
                </div>
                <div class="week-days">
                    <div>Sun</div>
                    <div>Mon</div>
                    <div>Tue</div>
                    <div>Wed</div>
                    <div>Thu</div>
                    <div>Fri</div>
                    <div>Sat</div>
                </div>
                <div class="days"></div>
            </div>
            <div class="tasks">
                <div class="tsk-header">
                    <h2 class="tsk-title">Tasks</h2>
                </div>
                <div class="tsk-container">
                    <ul class="tsk-list">
                        <li class="tsk-item" data-workout="leg" draggable="true">
                            <img class="wt-icon" src="./images/leg.png" alt="">
                            Leg Day</li>
                        <li class="tsk-item" data-workout="chest" draggable="true">
                            <img class="wt-icon" src="./images/chest.png" alt="">
                            Chest Day</li>
                        <li class="tsk-item" data-workout="shoulder" draggable="true">
                            <img class="wt-icon" id="shoulder" src="./images/shoulder.jpg" alt="">
                            Shoulder Day</li>
                        <li class="tsk-item" data-workout="arm" draggable="true">
                            <img class="wt-icon" src="./images/Arms.png" alt="">
                            Arms Day</li>
                    </ul>
                </div>
            </div>
            <div class="dropped-card hide">
                <div class="dropped-header">
                    <i class="bi bi-check-circle check"></i>
                    <i class="bi bi-x-circle close"></i>
                </div>
                <div class="dropped-info">
                    <i  class="bi bi-box-arrow-down"></i>
                    <p>drop your exercise blow...</p>
                    <div class="card-dropzone">
                        <i class="bi bi-plus-square"></i>
                    </div>
                </div>
            </div>
            <div class="workout-card hide">
                <div class="workout-header"> 
                    <i class="bi bi-check-circle check"></i>
                    <i class="bi bi-x-circle close"></i>
                </div>
                <ul class="workout-items">
                    <li class="wt-item">
                        <span class="item-num">1</span>
                        <h3 class="item-text">Barbell Squat</h3>
                            <img class="wt-icon" src="./images/leg.png" alt="">
                    </li>
                    <li class="wt-item">
                        <span class="item-num">2</span>
                        <h3 class="item-text">Romanian Deadlift</h3>
                            <img class="wt-icon" src="./images/leg.png" alt="">
                    </li>
                    <li class="wt-item">
                        <span class="item-num">3</span>
                        <h3 class="item-text">Leg Press</h3>
                            <img class="wt-icon" src="./images/leg.png" alt="">
                    </li>
                    <li class="wt-item">
                        <span class="item-num">4</span>
                        <h3 class="item-text">Walking Lunges</h3>
                            <img class="wt-icon" src="./images/leg.png" alt="">
                    </li>
                    <li class="wt-item">
                        <span class="item-num">5</span>
                        <h3 class="item-text">Leg Extension</h3>
                            <img class="wt-icon" src="./images/leg.png" alt="">
                    </li>
                </ul>
            </div>
        </div>
    </section>



    <script src="./script.js"></script>
</body>

</html>
